<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pokemon Games</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <h1>Pokemon Games</h1>
    <div class="content">
      <div id="games-list"></div>
      <div id="game-detail" class="hidden">
        <h2 id="game-name"></h2>
        <p id="game-generation"></p>
        <div class="game-info">
          <div>
            <h3>Regions</h3>
            <ul id="game-regions"></ul>
          </div>
          <div>
            <h3>Pokedexes</h3>
            <ul id="game-pokedexes"></ul>
          </div>
        </div>
      </div>
    </div>

    <script type="module" src="script.js"></script>
  </body>
</html>
