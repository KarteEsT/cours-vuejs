<!DOCTYPE html>
<html lang="en">
<head>
    <title>Pokedex</title>
    <meta charset="utf-8"/>
    <link href="../style.css" rel="stylesheet">
</head>
<body>
<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
<div id="app"></div>

<script type="module">
    import Pokedex from './Pokedex.js';
    import Plants from './Plants.js';

    const App = {
        components: {
            Plants,
            Pokedex,
        },
        data() {
            return {
                isPokedex: true,
            }
        },
        template: `
          <div>
            <label>
              Afficher le Pokédex ?
              <input v-model="isPokedex" type="checkbox" checked/>
            </label>

            <Pokedex v-if="isPokedex"/>
            <Plants v-else/>
          </div>`
    }

    Vue.createApp(App).mount('#app');
</script>
</body>
</html>
